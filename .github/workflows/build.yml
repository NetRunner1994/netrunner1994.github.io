name: Build HTML from templates

on:
  push:
    branches: ['**']
    paths: ['_src/**', 'build.js']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build pages
        run: node build.js

      - name: Commit generated HTML
        run: |
          git config user.name  "Build Bot"
          git config user.email "build@netrunnerbuilds.local"
          git add *.html
          git diff --staged --quiet || git commit -m "Build: regenerate HTML from templates [skip ci]"
          git push
