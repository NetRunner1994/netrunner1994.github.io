<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Build Do I Need? | Netrunner Builds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07090f;
      --surface:   #0d1220;
      --surface2:  #111827;
      --border:    #1e2d45;
      --cyan:      #00e5ff;
      --cyan-dim:  #00b8cc;
      --magenta:   #ff2d78;
      --text:      #c8d6e5;
      --text-dim:  #5a7085;
      --green:     #00ff9d;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem 4rem;
    }

    /* ── HEADER ── */
    .quiz-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .quiz-header .eyebrow {
      font-family: 'Share Tech Mono', monospace;
      font-size: .7rem;
      letter-spacing: .25em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: .5rem;
    }
    .quiz-header h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      color: #fff;
      line-height: 1.15;
    }
    .quiz-header h1 span { color: var(--cyan); }
    .quiz-header p {
      margin-top: .75rem;
      font-size: .9rem;
      color: var(--text-dim);
      max-width: 38ch;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── CARD ── */
    .card {
      width: 100%;
      max-width: 600px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--magenta), var(--cyan));
    }

    /* ── PROGRESS ── */
    .progress-bar {
      margin-bottom: 1.75rem;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .5rem;
    }
    .progress-meta .step-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: .65rem;
      letter-spacing: .2em;
      color: var(--cyan);
      text-transform: uppercase;
    }
    .progress-meta .step-count {
      font-family: 'Share Tech Mono', monospace;
      font-size: .65rem;
      color: var(--text-dim);
    }
    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan-dim), var(--cyan));
      border-radius: 99px;
      transition: width .4s cubic-bezier(.4,0,.2,1);
    }

    /* ── QUESTION ── */
    .question-block { animation: fadeIn .25s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

    .question-text {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      color: #fff;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }

    .options {
      display: grid;
      gap: .6rem;
    }
    .option-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: .85rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      cursor: pointer;
      text-align: left;
      transition: border-color .15s, background .15s, color .15s;
      width: 100%;
    }
    .option-btn:hover {
      border-color: var(--cyan);
      background: rgba(0,229,255,.06);
      color: #fff;
    }
    .option-btn .opt-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
      width: 1.5rem;
      text-align: center;
    }
    .option-btn .opt-label { flex: 1; }
    .option-btn .opt-sub {
      font-size: .75rem;
      color: var(--text-dim);
      margin-top: .15rem;
    }

    /* ── BACK ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      margin-top: 1.5rem;
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: .75rem;
      letter-spacing: .1em;
      cursor: pointer;
      text-transform: uppercase;
      transition: color .15s;
      padding: 0;
    }
    .back-btn:hover { color: var(--cyan); }

    /* ── SCAN ANIMATION ── */
    .scan-screen {
      text-align: center;
      padding: 1rem 0;
      animation: fadeIn .3s ease;
    }
    .scan-screen .scan-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: .7rem;
      letter-spacing: .2em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .scan-bar-wrap {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .scan-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--cyan-dim), var(--green));
      border-radius: 99px;
      animation: scanRun 1.4s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes scanRun { from { width:0%; } to { width:100%; } }
    .scan-screen .scan-status {
      font-family: 'Share Tech Mono', monospace;
      font-size: .75rem;
      color: var(--text-dim);
    }

    /* ── RESULT ── */
    .result-block { animation: fadeIn .35s ease; }

    .result-header {
      margin-bottom: 1.5rem;
    }
    .result-header .tier-badge {
      display: inline-block;
      font-family: 'Share Tech Mono', monospace;
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      padding: .25rem .65rem;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      border-radius: 2px;
      margin-bottom: .75rem;
    }
    .result-header h2 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.2rem, 3.5vw, 1.6rem);
      color: #fff;
      margin-bottom: .35rem;
    }
    .result-header .result-budget {
      font-family: 'Share Tech Mono', monospace;
      font-size: .85rem;
      color: var(--green);
    }

    .result-desc {
      font-size: .9rem;
      color: var(--text-dim);
      line-height: 1.65;
      margin-bottom: 1.5rem;
    }

    .specs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .5rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 420px) { .specs-grid { grid-template-columns: 1fr; } }

    .spec-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: .6rem .8rem;
    }
    .spec-chip .spec-key {
      font-family: 'Share Tech Mono', monospace;
      font-size: .6rem;
      letter-spacing: .15em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: .2rem;
    }
    .spec-chip .spec-val {
      font-size: .82rem;
      color: var(--text);
      font-weight: 500;
    }

    .use-for {
      background: rgba(0,229,255,.04);
      border: 1px solid rgba(0,229,255,.15);
      border-radius: 3px;
      padding: .85rem 1rem;
      margin-bottom: 1.75rem;
    }
    .use-for .use-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: .6rem;
      letter-spacing: .2em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: .4rem;
    }
    .use-for p {
      font-size: .85rem;
      color: var(--text);
      line-height: 1.6;
    }

    .cta-btn {
      display: block;
      width: 100%;
      padding: 1rem;
      background: var(--cyan);
      color: #000;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: .85rem;
      letter-spacing: .08em;
      text-align: center;
      text-decoration: none;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background .15s, transform .1s;
      margin-bottom: .75rem;
    }
    .cta-btn:hover { background: #33ecff; transform: translateY(-1px); }

    .restart-btn {
      display: block;
      width: 100%;
      padding: .75rem;
      background: none;
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: .7rem;
      letter-spacing: .15em;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      text-transform: uppercase;
      transition: color .15s, border-color .15s;
    }
    .restart-btn:hover { color: var(--text); border-color: var(--text-dim); }

    /* ── PCPartPicker link ── */
    .pcpp-link {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: .7rem;
      color: var(--cyan-dim);
      text-decoration: none;
      margin-bottom: 1.5rem;
      transition: color .15s;
    }
    .pcpp-link:hover { color: var(--cyan); }
  </style>
</head>
<body>

  <div class="quiz-header">
    <div class="eyebrow">// Netrunner Builds</div>
    <h1>What Build Do<br /><span>You Actually Need?</span></h1>
    <p>Answer 5 quick questions. Get a real recommendation — then let us handle the build.</p>
  </div>

  <div class="card" id="quiz-card">
    <!-- injected by JS -->
  </div>

<script>
const QUESTIONS = [
  {
    id: 'use',
    text: 'What will you mainly use this PC for?',
    options: [
      { value: 'gaming',    icon: '🎮', label: 'Gaming',           sub: 'Your primary goal is performance in games' },
      { value: 'work',      icon: '💼', label: 'Work & School',    sub: 'Productivity, Office apps, video calls' },
      { value: 'create',    icon: '🎬', label: 'Content Creation', sub: 'Video editing, streaming, design, 3D' },

    ]
  },
  {
    id: 'intensity',
    text: 'What kind of games or workloads are we talking?',
    options: [
      { value: 'light',     icon: '🍃', label: 'Light',            sub: 'Minecraft, indie games, Roblox, 1080p casual' },

      { value: 'mid',       icon: '💵💵', label: '$600 – $900',    sub: 'Sweet spot for most gamers' },
      { value: 'high',      icon: '💵💵💵', label: '$900 – $1,400', sub: 'Strong performance machine' },
      { value: 'ultra',     icon: '💎', label: '$1,400+',          sub: 'High-end or content creation powerhouse' },
    ]
  },
  {
    id: 'situation',
    text: "What is your current situation?",
    options: [
      { value: 'fresh',     icon: '📦', label: 'Starting fresh',   sub: 'Need everything from scratch' },
      { value: 'partial',   icon: '🔧', label: 'Have some parts',  sub: 'Reusing storage, case, or peripherals' },
      { value: 'upgrade',   icon: '⬆️', label: 'Upgrading my current PC', sub: 'Swapping CPU, GPU, or RAM into existing build' },
    ]
  },
  {
    id: 'pref',
    text: 'Any hardware brand preference?',
    options: [
      { value: 'none',      icon: '🤷', label: 'No preference',    sub: 'I just want the best value' },
      { value: 'amd',       icon: '🔴', label: 'AMD all the way',  sub: 'Ryzen CPU + Radeon GPU' },
      { value: 'intel_nv',  icon: '🟢', label: 'Intel + NVIDIA',   sub: 'Intel CPU + GeForce GPU' },
      { value: 'mixed',     icon: '🔀', label: 'AMD CPU + NVIDIA GPU', sub: 'Most popular combo right now' },
    ]
  }
];

const RESULTS = {
  // key: use_intensity_budget
  budget_entry: {
    tier: 'Entry Level',
    name: 'The Ghost Protocol',
    budget: 'Parts budget: ~$450–$600',
    desc: 'A lean, capable machine for everyday computing and casual gaming. Won\'t max out AAA titles, but handles anything you throw at it for school, work, and lighter games without breaking a sweat.',
    specs: [
      { key: 'CPU', val: 'AMD Ryzen 5 5600 or Intel Core i3-12100F' },
      { key: 'GPU', val: 'RX 6600 or RTX 3060 (used)' },
      { key: 'RAM', val: '16GB DDR4 3200MHz' },
      { key: 'Storage', val: '500GB NVMe SSD' },
      { key: 'Motherboard', val: 'B550 (AMD) or B660 (Intel)' },
      { key: 'PSU', val: '550W 80+ Bronze' },
    ],
    usedFor: 'Web browsing, Office apps, 1080p gaming (medium settings), casual titles like Minecraft, Valorant, and older AAA games.',
    pcpp: 'https://pcpartpicker.com/list/'
  },
  mid_sweet: {
    tier: 'Mid-Range',
    name: 'The Neural Link',
    budget: 'Parts budget: ~$700–$950',
    desc: 'The sweet spot. This build handles 1080p at high-to-max settings and pushes into 1440p comfortably. Perfect for the competitive gamer or someone who wants solid performance without the high-end price tag.',
    specs: [
      { key: 'CPU', val: 'AMD Ryzen 5 7600 or Intel Core i5-13600K' },
      { key: 'GPU', val: 'RTX 4060 Ti or RX 7700 XT' },
      { key: 'RAM', val: '32GB DDR5 5600MHz' },
      { key: 'Storage', val: '1TB NVMe Gen4 SSD' },
      { key: 'Motherboard', val: 'B650 (AMD) or Z790 (Intel)' },
      { key: 'PSU', val: '650W 80+ Gold' },
    ],
    usedFor: '1080p maxed out, 1440p high settings, competitive FPS with high framerates, FC 26, Fortnite, Warzone, and most current AAA titles.',
    pcpp: 'https://pcpartpicker.com/list/'
  },
  high_perf: {
    tier: 'High Performance',
    name: 'The Icepick',
    budget: 'Parts budget: ~$1,000–$1,400',
    desc: 'No compromises on 1440p, capable at 4K. Built for demanding open-world games, high-refresh competitive play, or someone who wants headroom for the next few years without rebuilding.',
    specs: [
      { key: 'CPU', val: 'AMD Ryzen 7 7700X or Intel Core i7-13700K' },
      { key: 'GPU', val: 'RTX 4070 Super or RX 7800 XT' },
      { key: 'RAM', val: '32GB DDR5 6000MHz' },
      { key: 'Storage', val: '2TB NVMe Gen4 SSD' },
      { key: 'Motherboard', val: 'X670 (AMD) or Z790 (Intel)' },
      { key: 'PSU', val: '750W 80+ Gold' },
    ],
    usedFor: 'Cyberpunk 2077, Battlefield 6, Flight Simulator at high-ultra settings. 1440p max, solid 4K, and great for light streaming on the side.',
    pcpp: 'https://pcpartpicker.com/list/'
  },
  ultra_beast: {
    tier: 'High-End / Creator',
    name: 'The Arasaka',
    budget: 'Parts budget: ~$1,500–$2,500+',
    desc: 'Maximum performance. Whether you\'re gaming at 4K with ray tracing maxed, streaming and editing simultaneously, or running heavy creative workloads — this rig handles all of it without flinching.',
    specs: [
      { key: 'CPU', val: 'AMD Ryzen 9 7950X3D or Intel Core i9-13900K' },
      { key: 'GPU', val: 'RTX 5070 Ti or RTX 5080' },
      { key: 'RAM', val: '64GB DDR5 6400MHz' },
      { key: 'Storage', val: '2TB Gen5 NVMe + 4TB HDD' },
      { key: 'Motherboard', val: 'X670E (AMD) or Z790 (Intel)' },
      { key: 'PSU', val: '850W–1000W 80+ Platinum' },
    ],
    usedFor: '4K gaming maxed, 240Hz 1440p, video editing, 3D rendering, streaming, running local AI models. Future-proofed for years.',
    pcpp: 'https://pcpartpicker.com/list/'
  },
  work_light: {
    tier: 'Office / School',
    name: 'The Operative',
    budget: 'Parts budget: ~$350–$550',
    desc: 'Fast, efficient, and reliable. Purpose-built for productivity — snappy boot times, multitasking across dozens of tabs, and handles everything Office 365, Zoom, and your browser can throw at it.',
    specs: [
      { key: 'CPU', val: 'Intel Core i5-12400 or Ryzen 5 5600G (APU)' },
      { key: 'GPU', val: 'Integrated graphics or RX 6400 (optional)' },
      { key: 'RAM', val: '16GB DDR4' },
      { key: 'Storage', val: '500GB NVMe SSD' },
      { key: 'Motherboard', val: 'B660 (Intel) or B550 (AMD)' },
      { key: 'PSU', val: '450W 80+ Bronze' },
    ],
    usedFor: 'Office apps, web browsing, video calls, PDF workflows, spreadsheets, light photo editing. Zero gaming frustration, maximum productivity.',
    pcpp: 'https://pcpartpicker.com/list/'
  },
  creator: {
    tier: 'Creator Workstation',
    name: 'The Edit Suite',
    budget: 'Parts budget: ~$1,200–$2,000',
    desc: 'Built for the grind. High core counts for rendering, fast RAM for video timelines, and a GPU that handles both creative workloads and gaming when the work is done. Adobe, DaVinci Resolve, Blender — all handled.',
    specs: [
      { key: 'CPU', val: 'AMD Ryzen 9 7900X or Intel Core i7-13700K' },
      { key: 'GPU', val: 'RTX 4070 Ti or RTX 5070' },
      { key: 'RAM', val: '64GB DDR5 5600MHz' },
      { key: 'Storage', val: '2TB NVMe + 4TB HDD for project storage' },
      { key: 'Motherboard', val: 'X670 (AMD) or Z790 (Intel)' },
      { key: 'PSU', val: '850W 80+ Gold' },
    ],
    usedFor: 'Video editing (4K timelines), motion graphics, 3D modeling, streaming, photography. Serious creative work without waiting for renders.',
    pcpp: 'https://pcpartpicker.com/list/'
  }
};

// ── STATE ──
let answers = {};
let currentQ = 0;
let showingResult = false;

// ── RESULT PICKER ──
function getResult(ans) {
  const { use, intensity, budget } = ans;

  if (use === 'work' || use === 'general') {
    if (budget === 'ultra' || budget === 'high') return RESULTS.work_light; // still light for work
    return RESULTS.work_light;
  }
  if (use === 'create') {
    if (budget === 'ultra') return RESULTS.ultra_beast;
    return RESULTS.creator;
  }

  // gaming path
  if (budget === 'ultra' || intensity === 'pro') return RESULTS.ultra_beast;
  if (budget === 'high' || intensity === 'heavy') return RESULTS.high_perf;
  if (budget === 'mid' || intensity === 'mid') return RESULTS.mid_sweet;
  return RESULTS.budget_entry;
}

// ── RENDER QUESTION ──
function renderQuestion(idx) {
  const q = QUESTIONS[idx];
  const pct = Math.round((idx / QUESTIONS.length) * 100);
  const card = document.getElementById('quiz-card');

  card.innerHTML = `
    <div class="progress-bar">
      <div class="progress-meta">
        <span class="step-label">// Initializing build scan</span>
        <span class="step-count">${idx + 1} / ${QUESTIONS.length}</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="question-block">
      <div class="question-text">${q.text}</div>
      <div class="options">
        ${q.options.map(o => `
          <button class="option-btn" data-val="${o.value}">
            <span class="opt-icon">${o.icon}</span>
            <span>
              <div class="opt-label">${o.label}</div>
              <div class="opt-sub">${o.sub}</div>
            </span>
          </button>
        `).join('')}
      </div>
      ${idx > 0 ? `<button class="back-btn" id="back-btn">← Back</button>` : ''}
    </div>
  `;

  card.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      answers[q.id] = btn.dataset.val;
      advance();
    });
  });

  const backBtn = card.querySelector('#back-btn');
  if (backBtn) {
    backBtn.addEventListener('click', () => {
      currentQ--;
      renderQuestion(currentQ);
    });
  }
}

// ── ADVANCE / SCAN / RESULT ──
function advance() {
  // skip intensity question if not gaming/create
  let next = currentQ + 1;
  if (next === 1 && (answers.use === 'work' || answers.use === 'general')) {
    answers.intensity = 'light';
    next = 2;
  }
  if (next >= QUESTIONS.length) {
    showScan();
  } else {
    currentQ = next;
    renderQuestion(currentQ);
  }
}

function showScan() {
  const card = document.getElementById('quiz-card');
  card.innerHTML = `
    <div class="scan-screen">
      <div class="scan-label">// Analyzing build requirements</div>
      <div class="scan-bar-wrap"><div class="scan-fill"></div></div>
      <div class="scan-status">Cross-referencing price/performance matrix...</div>
    </div>
  `;
  setTimeout(renderResult, 1600);
}

function renderResult() {
  const result = getResult(answers);
  const card = document.getElementById('quiz-card');

  card.innerHTML = `
    <div class="result-block">
      <div class="result-header">
        <div class="tier-badge">// ${result.tier}</div>
        <h2>${result.name}</h2>
        <div class="result-budget">${result.budget}</div>
      </div>

      <p class="result-desc">${result.desc}</p>

      <div class="specs-grid">
        ${result.specs.map(s => `
          <div class="spec-chip">
            <div class="spec-key">${s.key}</div>
            <div class="spec-val">${s.val}</div>
          </div>
        `).join('')}
      </div>

      <div class="use-for">
        <div class="use-label">// Great for</div>
        <p>${result.usedFor}</p>
      </div>

      <a class="pcpp-link" href="${result.pcpp}" target="_blank" rel="noopener">
        ↗ Browse compatible parts on PCPartPicker
      </a>

      <a class="cta-btn" href="/contact" id="cta-link">
        Got Your Parts? Book a Build →
      </a>
      <button class="restart-btn" id="restart-btn">[ Start Over ]</button>
    </div>
  `;

  card.querySelector('#restart-btn').addEventListener('click', () => {
    answers = {};
    currentQ = 0;
    renderQuestion(0);
  });
}

renderQuestion(0);
</script>
